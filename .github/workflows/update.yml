name: Update Repo

on:
  push:
    paths:
      - 'pool/main/**'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup GPG
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "trust-model tofu" >> ~/.gnupg/gpg.conf

      - name: Generate Packages
        run: |
          cd pool/main
          dpkg-scanpackages -m . /dev/null > Packages
          gzip -k Packages
          cp Packages.gz ../../dists/stable/main/binary-amd64/

      - name: Generate Release
        run: |
          apt-ftparchive release dists/stable/ > dists/stable/Release
          gpg -abs -u "${{ secrets.GPG_KEY_ID }}" -o dists/stable/Release.gpg dists/stable/Release
          gpg --clearsign -u "${{ secrets.GPG_KEY_ID }}" -o dists/stable/InRelease dists/stable/Release

      - name: Push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M')"
          git push
